name = "prism"
main = "src/index.ts"
compatibility_date = "2026-04-16"
compatibility_flags = ["nodejs_compat", "experimental"]

# Public workers.dev URL. The Worker fails closed if API_SECRET isn't
# configured (returns 503 until you set it), and rejects requests without
# a matching bearer token. Set the secret BEFORE your first deploy:
#   echo -n "$(openssl rand -base64 32)" | npx wrangler secret put API_SECRET
# For belt-and-suspenders, add Cloudflare Access on the route afterwards.
workers_dev = true

# Sandbox container image
[[containers]]
class_name = "Sandbox"
image = "./Dockerfile"

# Durable Object bindings
[[durable_objects.bindings]]
class_name = "Orchestrator"
name = "Orchestrator"

[[durable_objects.bindings]]
class_name = "Sandbox"
name = "Sandbox"

# Migrations: both classes use SQLite storage.
# Orchestrator stores fiber state and sweep snapshots.
# Sandbox is required by @cloudflare/sandbox.
[[migrations]]
new_sqlite_classes = ["Orchestrator", "Sandbox"]
tag = "v1"
