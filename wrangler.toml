name = "prism"
main = "src/index.ts"
compatibility_date = "2026-04-16"
compatibility_flags = ["nodejs_compat", "experimental"]

# Protected by API_SECRET + Cloudflare Access
workers_dev = false

# Sandbox container image
[[containers]]
class_name = "Sandbox"
image = "./Dockerfile"

# Durable Object bindings
[[durable_objects.bindings]]
class_name = "Orchestrator"
name = "Orchestrator"

[[durable_objects.bindings]]
class_name = "Sandbox"
name = "Sandbox"

# Migrations — Orchestrator uses SQLite for fibers + stash,
# Sandbox is required by @cloudflare/sandbox
[[migrations]]
new_sqlite_classes = ["Orchestrator", "Sandbox"]
tag = "v1"
